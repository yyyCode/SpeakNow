services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: speaknow
      POSTGRES_USER: speaknow
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  speaknow:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      SPEAKNOW_REDIS_ADDR: redis:6379
    volumes:
      - ../configs:/app/configs:ro

volumes:
  redis_data:
  pg_data:
