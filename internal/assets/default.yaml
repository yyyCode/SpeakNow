server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  read_header_timeout: 10s
  read_timeout: 0s
  write_timeout: 0s
  idle_timeout: 120s
  shutdown_timeout: 30s

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  cache_ttl: 24h

postgres:
  enabled: false

ratelimit:
  global_qps: 100
  global_burst: 200
  user_qps: 5
  user_burst: 10

asr:
  primary: "vosk"
  fallback: []
  timeout: 60s
  max_audio_size: 10485760
  max_duration: 300s

providers:
  mock:
    enabled: false
  aliyun:
    enabled: false
  tencent:
    enabled: false
  xunfei:
    enabled: false
  vosk:
    enabled: true
    model_path: "embedded"
    sample_rate: 16000
    cost_per_second: 0

log:
  level: "info"
  output: "stdout"
