server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  cache_ttl: 24h

postgres:
  dsn: "host=127.0.0.1 user=speaknow password=dev123 dbname=speaknow port=5432 sslmode=disable TimeZone=Asia/Shanghai"
  enabled: false

ratelimit:
  global_qps: 100
  global_burst: 200
  user_qps: 5
  user_burst: 10

asr:
  primary: "xunfei"
  fallback: ["mock"]
  timeout: 10s
  max_audio_size: 10485760
  max_duration: 300s

providers:
  mock:
    enabled: true
    cost_per_second: 0.001
  aliyun:
    enabled: false
    app_key: ""
    access_key_id: ""
    access_key_secret: ""
    cost_per_second: 0.0025
  tencent:
    enabled: false
    secret_id: ""
    secret_key: ""
    app_id: ""
    cost_per_second: 0.002
  xunfei:
    enabled: true
    app_id: ""
    api_key: ""
    api_secret: ""
    host_url: "wss://iat-api.xfyun.cn/v2/iat"
    cost_per_second: 0.002

log:
  level: "info"
  output: "stdout"
