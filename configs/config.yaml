    secret_key: ""
    app_id: ""
    cost_per_second: 0.002
  xunfei:
    enabled: true
    app_id: "adbed6c9"
    api_key: "f59f8e84113306f2eed50bb06ed8f20d"
    api_secret: "MjQxOTQ5NGJiYWY5MzYxOTUyN2ExZGNj"
    host_url: "wss://iat-api.xfyun.cn/v2/iat"
